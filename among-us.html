<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Among Us — MightyMA Arcade</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#02020f;--surface:#06061a;--card:#0a0a22;--accent1:#c084fc;--accent2:#22d3ee;--accent3:#f87171;--accent4:#4ade80;--text:#dde6ff;--muted:#818cf8;}
    html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif}
    @keyframes twinkle{0%,100%{opacity:.3}50%{opacity:.9}}
    @keyframes pulse-task{0%,100%{box-shadow:0 0 0 0 rgba(250,204,21,.4)}50%{box-shadow:0 0 0 8px rgba(250,204,21,0)}}
    @keyframes slide-in{from{transform:translateX(-100%)}to{transform:translateX(0)}}
    @keyframes flash-win{0%,100%{background:var(--bg)}50%{background:rgba(74,222,128,.15)}}
    #topbar{position:fixed;top:0;left:0;right:0;height:50px;background:rgba(2,2,15,.92);backdrop-filter:blur(8px);border-bottom:1px solid rgba(192,132,252,.2);display:flex;align-items:center;padding:0 1.2rem;gap:1rem;z-index:100}
    .tb-back{text-decoration:none;color:var(--muted);font-size:.85rem;font-weight:700;display:flex;align-items:center;gap:.35rem;padding:.35rem .75rem;border-radius:999px;border:1px solid rgba(255,255,255,.1);transition:all .2s}
    .tb-back:hover{color:#fff;border-color:var(--accent1)}
    .tb-title{font-size:1rem;font-weight:900;background:linear-gradient(90deg,var(--accent1),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .tb-spacer{flex:1}
    .tb-info{font-size:.78rem;color:var(--muted)}
    #taskbar{position:fixed;top:50px;left:0;right:0;height:28px;background:rgba(2,2,15,.88);border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;padding:0 1rem;gap:.75rem;z-index:100}
    .tb-label{font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;white-space:nowrap}
    .task-bar-outer{flex:1;height:10px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden;border:1px solid rgba(255,255,255,.1)}
    .task-bar-inner{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--accent4),var(--accent2));transition:width .4s ease;width:0%}
    .task-count{font-size:.72rem;font-weight:700;color:var(--accent4);white-space:nowrap;min-width:60px;text-align:right}
    #gameCanvas{display:block;position:fixed;top:78px;left:0;right:0;bottom:0;cursor:none}
    #controlsHint{position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);background:rgba(6,6,26,.88);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:.5rem 1.2rem;font-size:.72rem;color:var(--muted);display:flex;align-items:center;gap:1rem;z-index:100;backdrop-filter:blur(6px);white-space:nowrap;pointer-events:none}
    .ctrl-key{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:5px;padding:.15rem .45rem;font-weight:700;color:var(--text);font-size:.7rem}
    #winOverlay{position:fixed;inset:0;background:rgba(2,2,15,.85);backdrop-filter:blur(8px);display:none;flex-direction:column;align-items:center;justify-content:center;gap:1.2rem;z-index:200}
    #winOverlay.show{display:flex}
    .win-icon{font-size:5rem}
    .win-title{font-size:2.5rem;font-weight:900;background:linear-gradient(90deg,var(--accent4),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .win-sub{font-size:1rem;color:var(--muted);text-align:center;max-width:400px;line-height:1.6}
    .win-btn{display:inline-flex;align-items:center;gap:.45rem;padding:.7rem 1.8rem;background:linear-gradient(90deg,var(--accent4),var(--accent2));color:#000;font-weight:800;font-size:.95rem;border:none;border-radius:999px;cursor:pointer;font-family:inherit;transition:all .2s;margin-top:.5rem}
    .win-btn:hover{transform:scale(1.05)}
    .win-home{display:inline-flex;align-items:center;gap:.35rem;padding:.55rem 1.4rem;background:transparent;border:2px solid rgba(255,255,255,.2);color:var(--muted);font-weight:700;font-size:.9rem;border-radius:999px;cursor:pointer;font-family:inherit;transition:all .2s}
    .win-home:hover{border-color:var(--accent1);color:#fff}
    #taskPopup{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);background:var(--card);border:2px solid var(--accent2);border-radius:12px;padding:.9rem 1.4rem;display:none;flex-direction:column;gap:.5rem;align-items:center;z-index:150;min-width:260px;box-shadow:0 0 24px rgba(34,211,238,.25)}
    #taskPopup.show{display:flex}
    .tp-name{font-size:1rem;font-weight:800;color:var(--accent2)}
    .tp-hint{font-size:.8rem;color:var(--muted)}
    .tp-btn{background:var(--accent2);color:#000;border:none;border-radius:8px;font-size:.85rem;font-weight:800;padding:.45rem 1.2rem;cursor:pointer;font-family:inherit;transition:all .2s}
    .tp-btn:hover{background:#5eead4}
  </style>
</head>
<body>
<div id="topbar">
  <a class="tb-back" href="index.html">← Arcade</a>
  <div class="tb-title">🚀 Among Us — The Ship</div>
  <div class="tb-spacer"></div>
  <div class="tb-info" id="roomName">Cafeteria</div>
</div>
<div id="taskbar">
  <div class="tb-label">Tasks</div>
  <div class="task-bar-outer"><div class="task-bar-inner" id="taskBarInner"></div></div>
  <div class="task-count" id="taskCountEl">0 / 7</div>
</div>
<canvas id="gameCanvas"></canvas>
<div id="controlsHint">
  <span><span class="ctrl-key">W</span><span class="ctrl-key">A</span><span class="ctrl-key">S</span><span class="ctrl-key">D</span> or <span class="ctrl-key">↑↓←→</span> Move</span>
  <span><span class="ctrl-key">E</span> or <span class="ctrl-key">Space</span> Do Task</span>
  <span><span class="ctrl-key">R</span> Restart</span>
</div>
<div id="taskPopup">
  <div class="tp-name" id="tpName">Fix Wiring</div>
  <div class="tp-hint">Press E or Space to complete</div>
  <button class="tp-btn" onclick="doTask()">⚡ Do Task</button>
</div>
<div id="winOverlay">
  <div class="win-icon">✅</div>
  <div class="win-title">All Tasks Complete!</div>
  <div class="win-sub">The ship is safe! The crewmates win. No impostor could stop you.</div>
  <div style="display:flex;gap:.75rem;flex-wrap:wrap;justify-content:center">
    <button class="win-btn" onclick="restartGame()">🔄 Play Again</button>
    <button class="win-home" onclick="window.location.href='index.html'">🏠 Back to Arcade</button>
  </div>
</div>
<script>
const PLAYER_SPEED=2.8,PLAYER_RADIUS=13,TASK_RADIUS=18,TOTAL_TASKS=7,MAP_W=1400,MAP_H=800;
const ROOMS=[{name:'Cafeteria',x:340,y:40,w:360,h:220,color:'#0a1a2a'},{name:'MedBay',x:40,y:100,w:240,h:180,color:'#0a1a12'},{name:'Security',x:760,y:40,w:200,h:160,color:'#1a0a10'},{name:'Upper Engine',x:1040,y:40,w:240,h:190,color:'#1a1208'},{name:'Reactor',x:1200,y:260,w:200,h:200,color:'#1a0808'},{name:'Lower Engine',x:1040,y:540,w:240,h:190,color:'#1a1208'},{name:'Storage',x:700,y:480,w:280,h:220,color:'#0a0a1a'},{name:'Admin',x:760,y:240,w:220,h:200,color:'#121230'},{name:'Comms',x:760,y:640,w:240,h:160,color:'#0a1a1a'},{name:'Shields',x:940,y:620,w:220,h:180,color:'#0a1210'},{name:'Navigation',x:1100,y:640,w:200,h:160,color:'#120a1a'},{name:'Weapons',x:800,y:100,w:180,h:140,color:'#1a0a0a'},{name:'O2',x:580,y:400,w:160,h:140,color:'#0a1a0a'},{name:'Electrical',x:380,y:480,w:200,h:180,color:'#0f0f06'},{name:'Laboratory',x:180,y:400,w:200,h:200,color:'#080a1a'}];
const HALLS=[{x:400,y:260,w:80,h:220},{x:580,y:200,w:180,h:60},{x:700,y:180,w:120,h:180},{x:540,y:400,w:220,h:80},{x:280,y:160,w:120,h:80},{x:240,y:160,w:120,h:260},{x:280,y:280,w:120,h:140},{x:880,y:100,w:160,h:60},{x:940,y:100,w:160,h:60},{x:1080,y:200,w:200,h:100},{x:1200,y:200,w:80,h:300},{x:1080,y:460,w:200,h:120},{x:860,y:440,w:300,h:80},{x:860,y:520,w:100,h:160},{x:760,y:440,w:80,h:80},{x:300,y:580,w:100,h:100},{x:380,y:600,w:60,h:80},{x:440,y:540,w:80,h:140},{x:240,y:540,w:160,h:80},{x:620,y:540,w:100,h:160},{x:980,y:640,w:140,h:80},{x:1080,y:700,w:100,h:60}];
const PASSABLE=[...ROOMS,...HALLS];
let TASKS=[{name:'Fix Wiring',x:520,y:160,room:'Cafeteria',completed:false,emoji:'⚡'},{name:'Upload Data',x:830,y:320,room:'Admin',completed:false,emoji:'📤'},{name:'Scan Fingerprint',x:140,y:200,room:'MedBay',completed:false,emoji:'🖐️'},{name:'Empty Garbage',x:835,y:580,room:'Storage',completed:false,emoji:'🗑️'},{name:'Start Reactor',x:1270,y:360,room:'Reactor',completed:false,emoji:'⚛️'},{name:'Align Engine',x:1120,y:130,room:'Upper Engine',completed:false,emoji:'🔧'},{name:'Calibrate O2',x:620,y:460,room:'O2',completed:false,emoji:'💧'}];
const STARS=Array.from({length:200},()=>({x:Math.random()*MAP_W,y:Math.random()*MAP_H,r:Math.random()*1.5+0.5,alpha:Math.random()*0.5+0.1,ts:Math.random()*0.02+0.005,to:Math.random()*Math.PI*2}));
const ASTEROIDS=Array.from({length:8},()=>({x:Math.random()*MAP_W,y:Math.random()*MAP_H,r:Math.random()*8+4,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,rot:Math.random()*Math.PI*2,rs:(Math.random()-.5)*.01}));
let player={x:520,y:130,color:'#ff5252',visorColor:'#7dd3fc',speed:PLAYER_SPEED,r:PLAYER_RADIUS,facingRight:true};
const KEYS={};
document.addEventListener('keydown',e=>{KEYS[e.key.toLowerCase()]=true;if((e.key==='e'||e.key===' ')&&nearTask){e.preventDefault();doTask();}if(e.key==='r'||e.key==='R')restartGame();});
document.addEventListener('keyup',e=>{KEYS[e.key.toLowerCase()]=false;});
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
let camX=0,camY=0,nearTask=null,gameWon=false,tasksDone=0,frameCount=0;
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight-78;}
window.addEventListener('resize',resize);resize();
function isPassable(x,y){for(const a of PASSABLE){if(x>=a.x+PLAYER_RADIUS&&x<=a.x+a.w-PLAYER_RADIUS&&y>=a.y+PLAYER_RADIUS&&y<=a.y+a.h-PLAYER_RADIUS)return true;}return false;}
function getRoomName(x,y){for(const r of ROOMS){if(x>=r.x&&x<=r.x+r.w&&y>=r.y&&y<=r.y+r.h)return r.name;}return 'Hallway';}
function update(){
  if(gameWon)return;frameCount++;
  for(const a of ASTEROIDS){a.x+=a.vx;a.y+=a.vy;a.rot+=a.rs;if(a.x<-50)a.x=MAP_W+50;if(a.x>MAP_W+50)a.x=-50;if(a.y<-50)a.y=MAP_H+50;if(a.y>MAP_H+50)a.y=-50;}
  let dx=0,dy=0;
  if(KEYS['arrowleft']||KEYS['a'])dx-=player.speed;
  if(KEYS['arrowright']||KEYS['d'])dx+=player.speed;
  if(KEYS['arrowup']||KEYS['w'])dy-=player.speed;
  if(KEYS['arrowdown']||KEYS['s'])dy+=player.speed;
  if(dx&&dy){dx*=0.707;dy*=0.707;}
  if(dx>0)player.facingRight=true;if(dx<0)player.facingRight=false;
  if(isPassable(player.x+dx,player.y))player.x+=dx;
  if(isPassable(player.x,player.y+dy))player.y+=dy;
  player.x=Math.max(0,Math.min(MAP_W,player.x));player.y=Math.max(0,Math.min(MAP_H,player.y));
  camX=Math.max(0,Math.min(MAP_W-canvas.width,player.x-canvas.width/2));
  camY=Math.max(0,Math.min(MAP_H-canvas.height,player.y-canvas.height/2));
  nearTask=null;
  for(const t of TASKS){if(t.completed)continue;if(Math.hypot(player.x-t.x,player.y-t.y)<TASK_RADIUS+PLAYER_RADIUS+12){nearTask=t;break;}}
  document.getElementById('roomName').textContent=getRoomName(player.x,player.y);
  const popup=document.getElementById('taskPopup');
  if(nearTask){document.getElementById('tpName').textContent=nearTask.emoji+' '+nearTask.name;popup.classList.add('show');}
  else{popup.classList.remove('show');}
}
function drawCrewed(x,y,color,visorColor,facingRight,r){
  ctx.save();ctx.translate(x,y);if(!facingRight)ctx.scale(-1,1);
  ctx.beginPath();ctx.ellipse(0,0,r,r*1.3,0,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
  ctx.beginPath();ctx.roundRect(r*.5,-r*.5,r*.6,r*1.1,[3]);ctx.fillStyle=color;ctx.fill();
  ctx.beginPath();ctx.ellipse(-r*.1,-r*.25,r*.6,r*.45,-0.2,0,Math.PI*2);ctx.fillStyle=visorColor;ctx.globalAlpha=0.85;ctx.fill();ctx.globalAlpha=1;
  ctx.beginPath();ctx.ellipse(-r*.25,-r*.4,r*.18,r*.12,-0.3,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.7)';ctx.fill();
  ctx.fillStyle=color;
  ctx.beginPath();ctx.roundRect(-r*.6,r*.9,r*.5,r*.6,[3]);ctx.fill();
  ctx.beginPath();ctx.roundRect(r*.1,r*.9,r*.5,r*.6,[3]);ctx.fill();
  ctx.restore();
}
function drawTask(t){
  const sx=t.x-camX,sy=t.y-camY;
  if(sx<-50||sx>canvas.width+50||sy<-50||sy>canvas.height+50)return;
  const g=ctx.createRadialGradient(sx,sy,0,sx,sy,TASK_RADIUS*2);
  g.addColorStop(0,'rgba(250,204,21,0.35)');g.addColorStop(1,'rgba(250,204,21,0)');
  ctx.beginPath();ctx.arc(sx,sy,TASK_RADIUS*2,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
  const p=0.6+0.4*Math.sin(frameCount*0.05);
  ctx.beginPath();ctx.arc(sx,sy,TASK_RADIUS*p+TASK_RADIUS*.3,0,Math.PI*2);ctx.strokeStyle=`rgba(250,204,21,${0.4*p})`;ctx.lineWidth=2;ctx.stroke();
  ctx.beginPath();ctx.arc(sx,sy,TASK_RADIUS,0,Math.PI*2);ctx.fillStyle='#1a1600';ctx.fill();ctx.strokeStyle='#facc15';ctx.lineWidth=2;ctx.stroke();
  ctx.font=`${TASK_RADIUS}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(t.emoji,sx,sy);
  ctx.font='bold 10px Segoe UI,sans-serif';ctx.fillStyle='#facc15';ctx.textAlign='center';ctx.fillText(t.name,sx,sy+TASK_RADIUS+13);
}
function draw(){
  ctx.fillStyle='#02020f';ctx.fillRect(0,0,canvas.width,canvas.height);
  for(const s of STARS){
    const sx=s.x-camX,sy=s.y-camY;
    if(sx<0||sx>canvas.width||sy<0||sy>canvas.height)continue;
    const tw=s.alpha*(0.5+0.5*Math.sin(frameCount*s.ts+s.to));
    ctx.globalAlpha=tw;ctx.beginPath();ctx.arc(sx,sy,s.r,0,Math.PI*2);ctx.fillStyle='#ffffff';ctx.fill();ctx.globalAlpha=1;
  }
  for(const a of ASTEROIDS){
    const sx=a.x-camX,sy=a.y-camY;
    ctx.save();ctx.translate(sx,sy);ctx.rotate(a.rot);
    ctx.beginPath();ctx.arc(0,0,a.r,0,Math.PI*2);ctx.fillStyle='#1a1025';ctx.strokeStyle='rgba(192,132,252,0.25)';ctx.lineWidth=1;ctx.fill();ctx.stroke();
    ctx.restore();
  }
  for(const h of HALLS){ctx.fillStyle='#06060f';ctx.fillRect(h.x-camX,h.y-camY,h.w,h.h);}
  for(const r of ROOMS){
    const sx=r.x-camX,sy=r.y-camY;
    ctx.fillStyle=r.color||'#0a0a1a';ctx.fillRect(sx,sy,r.w,r.h);
    ctx.strokeStyle='rgba(192,132,252,0.2)';ctx.lineWidth=1;ctx.strokeRect(sx,sy,r.w,r.h);
    ctx.font='bold 11px Segoe UI,sans-serif';ctx.fillStyle='rgba(129,140,248,0.5)';ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText(r.name,sx+r.w/2,sy+6);
  }
  ctx.globalAlpha=0.06;ctx.strokeStyle='#818cf8';ctx.lineWidth=0.5;
  const gs=40;
  for(let gx=Math.floor(camX/gs)*gs;gx<camX+canvas.width;gx+=gs){ctx.beginPath();ctx.moveTo(gx-camX,0);ctx.lineTo(gx-camX,canvas.height);ctx.stroke();}
  for(let gy=Math.floor(camY/gs)*gs;gy<camY+canvas.height;gy+=gs){ctx.beginPath();ctx.moveTo(0,gy-camY);ctx.lineTo(canvas.width,gy-camY);ctx.stroke();}
  ctx.globalAlpha=1;
  for(const t of TASKS){
    if(!t.completed){drawTask(t);continue;}
    const sx=t.x-camX,sy=t.y-camY;
    if(sx<-30||sx>canvas.width+30||sy<-30||sy>canvas.height+30)continue;
    ctx.beginPath();ctx.arc(sx,sy,TASK_RADIUS,0,Math.PI*2);ctx.fillStyle='rgba(74,222,128,0.15)';ctx.fill();
    ctx.strokeStyle='rgba(74,222,128,0.5)';ctx.lineWidth=1.5;ctx.stroke();
    ctx.font=`${TASK_RADIUS}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.globalAlpha=0.5;ctx.fillText('✅',sx,sy);ctx.globalAlpha=1;
  }
  const px=player.x-camX,py=player.y-camY;
  ctx.beginPath();ctx.ellipse(px,py+player.r*1.4,player.r*.9,player.r*.3,0,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fill();
  drawCrewed(px,py,player.color,player.visorColor,player.facingRight,player.r);
  if(nearTask){ctx.beginPath();ctx.arc(px,py,player.r+6,0,Math.PI*2);ctx.strokeStyle='rgba(34,211,238,0.6)';ctx.lineWidth=2;ctx.stroke();}
  // Minimap
  const mmW=160,mmH=90,mmX=canvas.width-mmW-12,mmY=12,scX=mmW/MAP_W,scY=mmH/MAP_H;
  ctx.fillStyle='rgba(2,2,15,0.85)';ctx.beginPath();ctx.roundRect(mmX,mmY,mmW,mmH,[6]);ctx.fill();
  ctx.strokeStyle='rgba(192,132,252,0.3)';ctx.lineWidth=1;ctx.stroke();
  for(const r of ROOMS){ctx.fillStyle='rgba(129,140,248,0.25)';ctx.fillRect(mmX+r.x*scX,mmY+r.y*scY,r.w*scX,r.h*scY);}
  for(const t of TASKS){ctx.beginPath();ctx.arc(mmX+t.x*scX,mmY+t.y*scY,2.5,0,Math.PI*2);ctx.fillStyle=t.completed?'rgba(74,222,128,0.8)':'rgba(250,204,21,0.9)';ctx.fill();}
  ctx.beginPath();ctx.arc(mmX+player.x*scX,mmY+player.y*scY,3.5,0,Math.PI*2);ctx.fillStyle=player.color;ctx.fill();
  ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.stroke();
  ctx.font='bold 8px Segoe UI,sans-serif';ctx.fillStyle='rgba(129,140,248,0.7)';ctx.textAlign='center';ctx.textBaseline='bottom';ctx.fillText('MAP',mmX+mmW/2,mmY+mmH-2);
}
function doTask(){
  if(!nearTask||nearTask.completed)return;
  nearTask.completed=true;tasksDone++;nearTask=null;
  document.getElementById('taskPopup').classList.remove('show');
  const pct=(tasksDone/TOTAL_TASKS)*100;
  document.getElementById('taskBarInner').style.width=pct+'%';
  document.getElementById('taskCountEl').textContent=tasksDone+' / '+TOTAL_TASKS;
  if(tasksDone>=TOTAL_TASKS){gameWon=true;setTimeout(()=>document.getElementById('winOverlay').classList.add('show'),400);}
}
function restartGame(){
  gameWon=false;tasksDone=0;
  TASKS.forEach(t=>t.completed=false);
  player.x=520;player.y=130;
  document.getElementById('taskBarInner').style.width='0%';
  document.getElementById('taskCountEl').textContent='0 / '+TOTAL_TASKS;
  document.getElementById('winOverlay').classList.remove('show');
}
function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
</body>
</html>
